<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalender Indonesia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root {
      --primary: #144ac9;
      --primary-dark: #3c70ea;
      --today-bg: #1b5bf2;
      --holiday-bg: #fee2e2;
      --holiday-color: #dc2626;
      --event-bg: #fef9c3;
      --event-color: #b45309;
      --sunday-color: #dc2626;
      --saturday-color: #2563eb;
      /* light tokens */
      --bg: #f1f5f9;
      --surface: #fff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-2: #475569;
      --text-3: #94a3b8;
      --divider: #f1f5f9;
      --nav-btn-bg: #f1f5f9;
      --nav-btn-hover: #e2e8f0;
      --tab-bg: #f1f5f9;
      --tab-active: #fff;
      --loading-bg: rgba(255,255,255,0.85);
    }
    html.dark {
      --primary: #819ff8;
      --today-bg: #3c70ea;
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --text-2: #94a3b8;
      --text-3: #475569;
      --divider: #1e293b;
      --nav-btn-bg: #334155;
      --nav-btn-hover: #475569;
      --tab-bg: #334155;
      --tab-active: #1e293b;
      --holiday-bg: #3b1212;
      --holiday-color: #f87171;
      --event-bg: #3b2e05;
      --event-color: #fbbf24;
      --sunday-color: #f87171;
      --saturday-color: #60a5fa;
      --loading-bg: rgba(15,23,42,0.9);
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }

    /* ── HEADER ── */
    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    #yearTitle {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.01em;
      line-height: 1;
    }
    .nav-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--nav-btn-bg);
      color: var(--text-2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      transition: background 0.15s;
      cursor: pointer;
      flex-shrink: 0;
    }
    .nav-btn:hover { background: var(--nav-btn-hover); color: var(--text); }
    /* dark mode toggle */
    .dm-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--nav-btn-bg);
      color: var(--text-2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .dm-btn:hover { background: var(--nav-btn-hover); color: var(--text); }

    /* ── MONTH CARD ── */
    .month-card {
      border: none;
      border-radius: 14px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      overflow: hidden;
      background: var(--surface);
    }
    .month-name {
      text-align: center;
      padding: 0.6rem 0 0.4rem;
      font-weight: 800;
      font-size: 0.82rem;
      letter-spacing: 0.02em;
      color: var(--primary);
    }
    .month-body { padding: 0.3rem 0.45rem 0.5rem; }

    /* ── DAY GRID ── */
    .day-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      row-gap: 5px;
    }
    .dh {
      text-align: center;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 3px 0 5px;
      color: var(--text-3);
    }
    .dh.sun { color: var(--sunday-color); }
    .dh.sat { color: var(--saturday-color); }

    .dc {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 500;
      line-height: 1;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: auto;
    }
    .dc.empty { pointer-events: none; }
    .dc.sun { color: var(--sunday-color); font-weight: 500; }
    .dc.sat { color: var(--saturday-color); font-weight: 500; }

    .dc.is-holiday {
      background: var(--holiday-bg);
      color: var(--holiday-color);
      font-weight: 700;
      cursor: pointer;
    }
    .dc.is-event {
      background: var(--event-bg);
      color: var(--event-color);
      font-weight: 600;
      cursor: pointer;
    }
    .dc.is-today {
      background: var(--today-bg) !important;
      color: #fff !important;
      font-weight: 800;
      box-shadow: 0 2px 8px rgba(79,70,229,0.4);
    }

    .dc.is-holiday, .dc.is-event { cursor: default; }
    .dc.is-holiday:hover, .dc.is-event:hover { filter: brightness(0.94); }

    /* ── INLINE HOLIDAY LIST (under each month) ── */
    .month-holidays {
      border-top: 1px solid var(--divider);
      padding: 0.45rem 0.55rem 0.5rem;
    }
    .mhl-item {
      display: flex;
      align-items: flex-start;
      gap: 0.4rem;
      padding: 0.22rem 0;
      font-size: 0.7rem;
      line-height: 1.3;
    }
    .mhl-item + .mhl-item { border-top: 1px dashed var(--divider); }
    .mhl-day {
      font-weight: 800;
      min-width: 18px;
      flex-shrink: 0;
    }
    .mhl-day.hol { color: var(--holiday-color); }
    .mhl-day.evt { color: var(--event-color); }
    .mhl-text { color: var(--text-2); }
    .mhl-extra { display: none; }
    .mhl-toggle {
      background: none;
      border: none;
      padding: 0.15rem 0;
      font-size: 0.68rem;
      color: var(--primary);
      cursor: pointer;
      font-weight: 600;
      display: block;
      margin-top: 2px;
    }
    .mhl-toggle:hover { text-decoration: underline; }

    /* ── MOBILE: year-view cards full-width → bigger cells ── */
    @media (max-width: 767px) {
      #calGrid .month-name { font-size: 1rem; padding: 0.65rem 0 0.45rem; }
      #calGrid .month-body { padding: 0.4rem 0.8rem 0.6rem; }
      #calGrid .day-grid   { row-gap: 5px; }
      #calGrid .dh         { font-size: 0.7rem; padding: 4px 0 8px; }
      #calGrid .dc         { width: 40px; height: 40px; font-size: 0.88rem; }
      #calGrid .mhl-item   { font-size: 0.78rem; padding: 0.28rem 0; }
      #calGrid .mhl-day    { min-width: 22px; font-size: 0.78rem; }
      #calGrid .month-holidays { padding: 0.55rem 0.8rem 0.65rem; }
      /* show all items, hide toggle on mobile */
      #calGrid .mhl-extra  { display: flex; }
      #calGrid .mhl-toggle { display: none; }
    }

    /* ── LEGEND ── */
    .legend-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    /* ── TABS ── */
    .view-tabs {
      display: flex;
      gap: 0.25rem;
      background: var(--tab-bg);
      border-radius: 999px;
      padding: 3px;
    }
    .view-tab {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text-2);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      transition: background 0.15s, color 0.15s;
      cursor: pointer;
      white-space: nowrap;
    }
    .view-tab.active {
      background: var(--tab-active);
      color: var(--primary);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .view-tab:not(.active):hover { color: var(--text); }

    /* ── SINGLE MONTH (bulan) VIEW ── */
    .month-big-card {
      max-width: 520px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      overflow: hidden;
    }
    .month-big-header {
      text-align: center;
      padding: 0.75rem 0 0.4rem;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.02em;
      color: var(--primary);
    }
    .month-big-body { padding: 0.4rem 0.8rem 0.6rem; }
    .day-grid-lg {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      row-gap: 5px;
    }
    .dh-lg {
      text-align: center;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 0 8px;
      color: var(--text-3);
    }
    .dh-lg.sun { color: var(--sunday-color); }
    .dh-lg.sat { color: var(--saturday-color); }
    .dc-lg {
      text-align: center;
      font-size: 0.92rem;
      font-weight: 500;
      line-height: 1;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: auto;
    }
    .dc-lg.empty { pointer-events: none; }
    .dc-lg.sun { color: var(--sunday-color); font-weight: 500; }
    .dc-lg.sat { color: var(--saturday-color); font-weight: 500; }
    .dc-lg.is-holiday { background: var(--holiday-bg); color: var(--holiday-color); font-weight: 700; }
    .dc-lg.is-event   { background: var(--event-bg);   color: var(--event-color);   font-weight: 700; }
    .dc-lg.is-today {
      background: var(--today-bg) !important;
      color: #fff !important;
      font-weight: 800;
      box-shadow: 0 2px 10px rgba(79,70,229,0.45);
    }
    .month-big-holidays {
      border-top: 1px solid var(--divider);
      padding: 0.55rem 0.8rem 0.65rem;
    }
    .mhl-lg-item {
      display: flex;
      align-items: flex-start;
      gap: 0.4rem;
      padding: 0.28rem 0;
      font-size: 0.78rem;
      line-height: 1.3;
    }
    .mhl-lg-item + .mhl-lg-item { border-top: 1px dashed var(--divider); }
    .mhl-lg-day { font-weight: 800; min-width: 22px; flex-shrink: 0; }
    .mhl-lg-day.hol { color: var(--holiday-color); }
    .mhl-lg-day.evt { color: var(--event-color); }
    .mhl-lg-text { color: var(--text-2); }

    /* ── LOADING SPINNER OVERLAY ── */
    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: var(--loading-bg);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loadingOverlay">
  <div class="spinner-border text-primary" style="width:3rem;height:3rem;" role="status"></div>
  <div class="text-secondary fw-semibold">Memuat data hari libur&hellip;</div>
</div>

<!-- ══ HEADER ══ -->
<header class="app-header">
  <div class="container">
    <div class="d-flex align-items-center gap-3">
      <!-- prev / next -->
      <div class="d-flex gap-1">
        <button class="nav-btn" id="btnPrev"><i class="bi bi-chevron-left"></i></button>
        <button class="nav-btn" id="btnNext"><i class="bi bi-chevron-right"></i></button>
      </div>
      <!-- title -->
      <div id="yearTitle">2026</div>
      <!-- tabs + dark mode pushed to right -->
      <div class="ms-auto d-flex align-items-center gap-2">
        <div class="view-tabs">
          <button class="view-tab active" id="tabYear" onclick="switchTab('year')">
            <i class="bi bi-calendar3 me-1"></i>Tahun
          </button>
          <button class="view-tab" id="tabMonth" onclick="switchTab('month')">
            <i class="bi bi-calendar-month me-1"></i>Bulan
          </button>
        </div>
        <button class="dm-btn" id="dmToggle" title="Toggle dark mode" onclick="toggleDark()">
          <i class="bi bi-moon-fill" id="dmIcon"></i>
        </button>
      </div>
    </div>
  </div>
</header>

<!-- ══ MAIN ══ -->
<main class="container py-4">

  <!-- Legend -->
  <div class="d-flex flex-wrap gap-3 justify-content-center mb-4">
    <div class="d-flex align-items-center gap-2">
      <span class="legend-dot" style="background:var(--today-bg)"></span>
      <small class="text-secondary">Hari Ini</small>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span class="legend-dot" style="background:var(--holiday-bg);border:1.5px solid var(--holiday-color)"></span>
      <small class="text-secondary">Libur Nasional</small>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span class="legend-dot" style="background:var(--event-bg);border:1.5px solid var(--event-color)"></span>
      <small class="text-secondary">Perayaan</small>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span class="legend-dot" style="background:var(--sunday-color)"></span>
      <small class="text-danger">Minggu</small>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span class="legend-dot" style="background:var(--saturday-color)"></span>
      <small class="text-primary">Sabtu</small>
    </div>
  </div>

  <!-- Calendar grid (year view) -->
  <div id="viewYear">
    <div class="row g-3" id="calGrid"></div>
  </div>

  <!-- Single month view -->
  <div id="viewMonth" style="display:none">
    <div id="calMonth"></div>
  </div>

</main>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API_URL = 'https://raw.githubusercontent.com/guangrei/APIHariLibur_V2/main/calendar.min.json';

  const MONTH_NAMES = [
    'Januari','Februari','Maret','April','Mei','Juni',
    'Juli','Agustus','September','Oktober','November','Desember'
  ];
  const DAY_SHORT = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  const DAY_LONG  = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];

  let holidays = {};
  let currentYear = 2026;
  let currentMonth = new Date().getMonth();
  let currentView = 'year'; // 'year' | 'month'

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  // ── Dark mode ───────────────────────────────────────────
  function applyDark(dark) {
    document.documentElement.classList.toggle('dark', dark);
    document.getElementById('dmIcon').className = dark ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
  }
  function toggleDark() {
    const dark = !document.documentElement.classList.contains('dark');
    localStorage.setItem('darkMode', dark ? '1' : '');
    applyDark(dark);
  }
  // init from saved preference or system preference
  const savedDark = localStorage.getItem('darkMode');
  if (savedDark === '1' || (savedDark === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    applyDark(true);
  }

  // ── Collapsible holiday toggle ───────────────────────────────
  function toggleHl(btn) {
    const extras = btn.closest('.month-holidays').querySelectorAll('.mhl-extra');
    const expanded = btn.dataset.expanded === '1';
    extras.forEach(el => el.style.display = expanded ? '' : 'flex');
    btn.dataset.expanded = expanded ? '' : '1';
    const count = parseInt(btn.dataset.count, 10);
    btn.textContent = expanded ? `${count} hari libur` : 'Sembunyikan';
  }

  // ── Fetch ──────────────────────────────────────────────
  async function fetchHolidays() {
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const raw = await res.json();
      delete raw.info;
      holidays = raw;
    } catch (e) {
      console.warn('Gagal memuat data hari libur:', e.message);
      holidays = {};
    }
  }

  // ── Helpers ────────────────────────────────────────────
  function pad(n) { return String(n).padStart(2, '0'); }
  function dateKey(y, m, d) { return `${y}-${pad(m + 1)}-${pad(d)}`; }

  // ── Build one month card ───────────────────────────────
  function buildMonth(year, month) {
    const firstDow = new Date(year, month, 1).getDay();
    const totalDays = new Date(year, month + 1, 0).getDate();

    // Day-header row
    let headerHtml = DAY_SHORT.map((d, i) =>
      `<div class="dh${i===0?' sun':i===6?' sat':''}">${d}</div>`
    ).join('');

    // Empty cells
    let cells = Array(firstDow).fill('<div class="dc empty"></div>');
    const monthHolidays = [];

    for (let d = 1; d <= totalDays; d++) {
      const key = dateKey(year, month, d);
      const dow = new Date(year, month, d).getDay();
      const info = holidays[key];
      const isToday = (year === today.getFullYear() && month === today.getMonth() && d === today.getDate());

      let cls = 'dc';
      if (isToday) cls += ' is-today';
      else if (!info && dow === 0) cls += ' sun';
      else if (!info && dow === 6) cls += ' sat';

      if (info) {
        if (info.holiday) cls += ' is-holiday';
        else cls += ' is-event';
        monthHolidays.push({ d, info });
      }

      cells.push(`<div class="${cls}">${d}</div>`);
    }

    // Inline holiday list — all hidden by default, collapsible
    let hlHtml = '';
    if (monthHolidays.length > 0) {
      const allItems = monthHolidays.map(({ d, info }) => {
        const type = info.holiday ? 'hol' : 'evt';
        return `<div class="mhl-item mhl-extra">
          <span class="mhl-day ${type}">${d}</span>
          <span class="mhl-text">${info.summary[0]}</span>
        </div>`;
      }).join('');
      const toggleId = `tog-${year}-${month}`;
      const toggleBtn = `<button class="mhl-toggle" id="${toggleId}" onclick="toggleHl(this)" data-count="${monthHolidays.length}">${monthHolidays.length} hari libur</button>`;
      hlHtml = `<div class="month-holidays">${allItems}${toggleBtn}</div>`;
    }

    const col = document.createElement('div');
    col.className = 'col-12 col-md-4 col-lg-3';
    col.innerHTML = `
      <div class="month-card">
        <div class="month-name">${MONTH_NAMES[month]} ${year}</div>
        <div class="month-body">
          <div class="day-grid">
            ${headerHtml}
            ${cells.join('')}
          </div>
        </div>
        ${hlHtml}
      </div>`;
    return col;
  }

  // ── Build full calendar (year view) ────────────────────
  function buildCalendar(year) {
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    for (let m = 0; m < 12; m++) {
      grid.appendChild(buildMonth(year, m));
    }
  }

  // ── Build single month (month view) ────────────────────
  function buildSingleMonth(year, month) {
    const firstDow  = new Date(year, month, 1).getDay();
    const totalDays = new Date(year, month + 1, 0).getDate();

    const headerHtml = DAY_SHORT.map((d, i) =>
      `<div class="dh-lg${i===0?' sun':i===6?' sat':''}">${d}</div>`
    ).join('');

    let cells = Array(firstDow).fill('<div class="dc-lg empty"></div>');
    const monthHolidays = [];

    for (let d = 1; d <= totalDays; d++) {
      const key = dateKey(year, month, d);
      const dow = new Date(year, month, d).getDay();
      const info = holidays[key];
      const isToday = (year === today.getFullYear() && month === today.getMonth() && d === today.getDate());

      let cls = 'dc-lg';
      if (isToday) cls += ' is-today';
      else if (!info && dow === 0) cls += ' sun';
      else if (!info && dow === 6) cls += ' sat';

      if (info) {
        cls += info.holiday ? ' is-holiday' : ' is-event';
        monthHolidays.push({ d, info });
      }

      cells.push(`<div class="${cls}">${d}</div>`);
    }

    let hlHtml = '';
    if (monthHolidays.length > 0) {
      const items = monthHolidays.map(({ d, info }) => {
        const type = info.holiday ? 'hol' : 'evt';
        return `<div class="mhl-lg-item">
          <span class="mhl-lg-day ${type}">${d}</span>
          <span class="mhl-lg-text">${info.summary[0]}</span>
        </div>`;
      }).join('');
      hlHtml = `<div class="month-big-holidays">${items}</div>`;
    }

    document.getElementById('calMonth').innerHTML = `
      <div class="month-big-card">
        <div class="month-big-header">${MONTH_NAMES[month]} ${year}</div>
        <div class="month-big-body">
          <div class="day-grid-lg">
            ${headerHtml}
            ${cells.join('')}
          </div>
        </div>
        ${hlHtml}
      </div>`;
  }

  // ── Tab switch ──────────────────────────────────────────
  function switchTab(view) {
    currentView = view;
    document.getElementById('tabYear').classList.toggle('active', view === 'year');
    document.getElementById('tabMonth').classList.toggle('active', view === 'month');
    document.getElementById('viewYear').style.display  = view === 'year'  ? '' : 'none';
    document.getElementById('viewMonth').style.display = view === 'month' ? '' : 'none';
    updateHeader();
    if (view === 'month') buildSingleMonth(currentYear, currentMonth);
  }

  // ── Header title ────────────────────────────────────────
  function updateHeader() {
    if (currentView === 'year') {
      document.getElementById('yearTitle').textContent = currentYear;
    } else {
      document.getElementById('yearTitle').textContent = `${MONTH_NAMES[currentMonth]} ${currentYear}`;
    }
  }

  // ── Year / month navigation ─────────────────────────────
  function setYear(year) {
    currentYear = year;
    updateHeader();
    buildCalendar(year);
  }

  document.getElementById('btnPrev').addEventListener('click', () => {
    if (currentView === 'year') {
      setYear(currentYear - 1);
    } else {
      currentMonth--;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      updateHeader();
      buildSingleMonth(currentYear, currentMonth);
    }
  });

  document.getElementById('btnNext').addEventListener('click', () => {
    if (currentView === 'year') {
      setYear(currentYear + 1);
    } else {
      currentMonth++;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      updateHeader();
      buildSingleMonth(currentYear, currentMonth);
    }
  });

  // ── Init ───────────────────────────────────────────────
  (async () => {
    await fetchHolidays();
    document.getElementById('loadingOverlay').style.display = 'none';
    currentMonth = today.getMonth();
    setYear(currentYear);
  })();
</script>
