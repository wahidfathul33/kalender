<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalender Indonesia</title>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#f1f5f9" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Kalender" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/x-icon" href="/icons/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/android-chrome-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/android-chrome-512x512.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Loading overlay -->
<div id="loadingOverlay">
  <div class="spinner-border text-primary" style="width:3rem;height:3rem;" role="status"></div>
  <div class="text-secondary fw-semibold">Memuat data hari libur&hellip;</div>
</div>

<!-- ══ HEADER ══ -->
<header class="app-header">
  <div class="container">
    <div class="d-flex align-items-center gap-3">
      <!-- prev / next -->
      <div class="d-flex gap-1">
        <button class="nav-btn" id="btnPrev"><i class="bi bi-chevron-left"></i></button>
        <button class="nav-btn" id="btnNext"><i class="bi bi-chevron-right"></i></button>
      </div>
      <!-- title -->
      <div id="yearTitle">2026</div>
      <!-- tabs + dark mode pushed to right -->
      <div class="ms-auto d-flex align-items-center gap-2">
        <button class="dm-btn" id="dmToggle" title="Toggle dark mode" onclick="toggleDark()">
          <i class="bi bi-moon-fill" id="dmIcon"></i>
        </button>
      </div>
    </div>
  </div>
</header>

<!-- ══ MAIN ══ -->
<main class="container py-4">
  <div class="d-flex justify-content-center">
    <div class="view-tabs mb-4">
        <button class="view-tab active" id="tabMonth" onclick="switchTab('month')">Bulan</button>
        <button class="view-tab" id="tabYear" onclick="switchTab('year')">Tahun</button>
    </div>
  </div>

  <!-- Single month view -->
  <div id="viewMonth">
    <div id="calMonth"></div>
  </div>

  <!-- Calendar grid (year view) -->
  <div id="viewYear" style="display:none">
    <div class="row g-3" id="calGrid"></div>
  </div>

  <!-- Legend -->
  <div class="d-flex flex-wrap gap-3 justify-content-center mb-4 mt-4">
    <div class="d-flex align-items-center gap-2">
      <span class="legend-dot" style="background:var(--today-bg)"></span>
      <small class="text-secondary">Hari Ini</small>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span class="legend-dot" style="background:var(--holiday-bg);border:1.5px solid var(--holiday-color)"></span>
      <small class="text-secondary">Libur Nasional</small>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span class="legend-dot" style="background:var(--event-bg);border:1.5px solid var(--event-color)"></span>
      <small class="text-secondary">Perayaan</small>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span class="legend-dot" style="background:var(--sunday-color)"></span>
      <small class="text-danger">Minggu</small>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span class="legend-dot" style="background:var(--saturday-color)"></span>
      <small class="text-primary">Sabtu</small>
    </div>
  </div>

</main>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
